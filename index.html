<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>双武器战斗测试</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hud-card">
        <div class="title-row">
          <h1>双武器战斗测试</h1>
          <button id="start-btn" type="button">开始教程</button>
        </div>
        <p class="subtitle">A/D 移动 · Space 跳跃 · S+Space 下落 · 鼠标左键攻击 · 鼠标右键格挡 · Shift 闪避 / 反击 · 滚轮下切换武器</p>
        <div class="layout">
          <canvas id="game" width="960" height="540"></canvas>
          <div id="debug-ui" class="debug-ui-hidden" aria-hidden="true"></div>
        </div>
      </section>
    </main>
    <script src="./tutorial_flow.js"></script>
    <script src="./encounter_flow.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
